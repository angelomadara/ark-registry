version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ark-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - ark-network
    ports:
      - "80:80"
    depends_on:
      - database

  database:
    image: postgis/postgis:latest
    container_name: ark-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ark_registry
      - POSTGRES_USER=ark_user
      - POSTGRES_PASSWORD=ark_password
    networks:
      - ark-network
    ports:
      - "5432:5432"

networks:
  ark-network:
    driver: bridge

volumes:
  postgres_data:
