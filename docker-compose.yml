version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ark-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - ark-network
    depends_on:
      - db

  db:
    image: postgis/postgis:latest
    container_name: ark-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ark_registry
      - POSTGRES_USER=ark_user
      - POSTGRES_PASSWORD=ark_password
    networks:
      - ark-network
    ports:
      - "5432:5432"

  webserver:
    image: nginx:alpine
    container_name: ark-webserver
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - ark-network
    depends_on:
      - app

networks:
  ark-network:
    driver: bridge

volumes:
  postgres_data:
